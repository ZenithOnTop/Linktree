<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen LinkTree | Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            /* FIXED WALLPAPER GUNUNG DARK */
            background-image: url('https://img.freepik.com/premium-photo/dark-mountains-images-background-copy-space_1179130-779397.jpg?semt=ais_hybrid&w=740&q=80'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: white; 
            font-family: 'Poppins', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            width: 100vw;
            overflow-x: hidden;
        }

        /* OVERLAY GELAP AGAR KONTEN MENONJOL */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); 
            z-index: 0;
        }

        .container { 
            width: 100%; 
            max-width: 480px; 
            padding: 60px 25px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            z-index: 1;
            margin: auto;
        }

        .profile { text-align: center; margin-bottom: 40px; }
        
        .logo-text { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 2.3rem; 
            letter-spacing: 2px;
            background: linear-gradient(90deg, #00f2ff, #bc13fe); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            text-shadow: 0 0 20px rgba(188, 19, 254, 0.4); 
            margin-bottom: 5px; 
            text-transform: uppercase; 
        }
        
        .sub-text { font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase; opacity: 0.7; }

        .links-group { width: 100%; display: flex; flex-direction: column; gap: 16px; }
        
        .link-card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 16px; 
            padding: 20px 24px; 
            text-decoration: none; 
            color: white; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
        }

        .link-card i { font-size: 1.3rem; width: 35px; text-align: center; }
        .link-card span { flex-grow: 1; margin-left: 12px; font-size: 0.95rem; }
        
        .link-card:hover:not(.empty-slot) { 
            background: rgba(255, 255, 255, 0.1); 
            border-color: #00f2ff; 
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            transform: translateY(-3px); 
        }

        /* WARNA IKON */
        .fa-youtube { color: #ff0000; }
        .fa-github { color: #ffffff; }
        .fa-hourglass-start { color: #888; }

        /* SLOT KOSONG STYLE */
        .empty-slot { 
            opacity: 0.4; 
            cursor: default; 
            border-style: dashed; 
            background: rgba(255, 255, 255, 0.02);
        }
        
        .footer { 
            margin-top: 40px; 
            font-family: 'Orbitron'; 
            font-size: 0.65rem; 
            opacity: 0.4; 
            letter-spacing: 2px; 
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile">
            <h1 class="logo-text">ZEN LINKTREE</h1>
            <div class="sub-text">Digital Presence</div>
        </div>

        <div class="links-group">
            <a href="https://www.youtube.com/@ZenithMc10" target="_blank" class="link-card">
                <i class="fab fa-youtube"></i>
                <span>YouTube | Zenith</span>
                <i class="fas fa-external-link-alt" style="font-size: 0.7rem; opacity: 0.3;"></i>
            </a>

            <a href="https://zenithontop.github.io/Linktree/" target="_blank" class="link-card">
                <i class="fab fa-github"></i>
                <span>Website | Zen Linktree</span>
                <i class="fas fa-external-link-alt" style="font-size: 0.7rem; opacity: 0.3;"></i>
            </a>

            <a href="https://zenithontop.github.io/CustomLinkTree/" target="_blank" class="link-card">
                <i class="fab fa-github"></i>
                <span>Website | Zenith Custom LinkTree</span>
                <i class="fas fa-external-link-alt" style="font-size: 0.7rem; opacity: 0.3;"></i>
            </a>

            <div class="link-card empty-slot">
                <i class="fas fa-hourglass-start"></i>
                <span>[ Haven't Done Anything ]</span>
            </div>

            <div class="link-card empty-slot">
                <i class="fas fa-hourglass-start"></i>
                <span>[ Haven't Done Anything ]</span>
            </div>
        </div>

        <div class="footer">
            ZEN HUB // 2026 // EST.
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen LinkTree | Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: #000; 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            overflow: hidden; /* Mencegah scrollbar muncul saat resize */
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh; 
            width: 100vw;
        }

        /* FIXED VIDEO BACKGROUND - ANTI KEPOTONG */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
            overflow: hidden;
        }

        .video-background iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 100vh;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        /* Logika Ratio agar Video selalu menutupi layar seperti 'object-fit: cover' */
        @media (min-aspect-ratio: 16/9) {
            .video-background iframe {
                width: 100vw;
                height: 56.25vw; /* 16:9 dari width */
            }
        }

        @media (max-aspect-ratio: 16/9) {
            .video-background iframe {
                width: 177.78vh; /* 16:9 dari height */
                height: 100vh;
            }
        }

        .video-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.9) 100%); 
            z-index: -1; 
        }

        .container { 
            width: 100%; 
            max-width: 480px; 
            padding: 40px 25px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            z-index: 1;
            margin: auto; /* Memastikan konten selalu di tengah vertikal */
        }

        /* HEADER ZEN LINKTREE */
        .profile { text-align: center; margin-bottom: 40px; }
        .logo-text { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 2.3rem; 
            letter-spacing: 2px; 
            background: linear-gradient(90deg, #00f2ff, #bc13fe); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            text-shadow: 0 0 20px rgba(188, 19, 254, 0.6), 0 0 40px rgba(0, 242, 255, 0.4); 
            margin-bottom: 5px; 
            text-transform: uppercase; 
        }
        .sub-text { font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase; opacity: 0.7; font-weight: 300; }

        /* LINKS STYLE */
        .links-group { width: 100%; display: flex; flex-direction: column; gap: 14px; }
        .link-card { 
            background: rgba(255, 255, 255, 0.04); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 14px; 
            padding: 18px 22px; 
            text-decoration: none; 
            color: white; 
            font-weight: 500; 
            transition: 0.3s all ease-in-out; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
        }

        .link-card i { font-size: 1.2rem; width: 30px; text-align: center; }
        .link-card span { flex-grow: 1; margin-left: 12px; font-size: 0.9rem; }
        
        .link-card:hover { 
            background: rgba(0, 242, 255, 0.1); 
            border-color: #00f2ff; 
            transform: scale(1.02); 
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); 
        }

        /* WARNA IKON */
        .fa-youtube { color: #ff0000; }
        .fa-github { color: #ffffff; }
        .fa-music { color: #00f2ff; }
        .fa-hourglass-start { color: #555; }

        .empty-slot { opacity: 0.3; cursor: default; }
        .footer { margin-top: 30px; font-family: 'Orbitron'; font-size: 0.6rem; opacity: 0.4; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="video-background">
        <iframe src="https://www.youtube.com/embed/jfKfPfyJRdk?autoplay=1&mute=1&loop=1&controls=0&showinfo=0&autohide=1&playlist=jfKfPfyJRdk&iv_load_policy=3&rel=0&disablekb=1" frameborder="0" allow="autoplay; encrypted-media"></iframe>
    </div>
    
    <div class="video-overlay"></div>

    <div class="container">
        <div class="profile">
            <h1 class="logo-text">ZEN LINKTREE</h1>
            <div class="sub-text">Digital Presence</div>
        </div>

        <div class="links-group">
            <a href="https://www.youtube.com/@ZenithMc10" target="_blank" class="link-card">
                <i class="fab fa-youtube"></i>
                <span>YouTube | Zenith</span>
                <i class="fas fa-arrow-right" style="font-size: 0.7rem; opacity: 0.3;"></i>
            </a>

            <a href="https://zenithontop.github.io/muzik/" target="_blank" class="link-card">
                <i class="fas fa-music"></i>
                <span>Website | Zenith Muzik Player</span>
                <i class="fas fa-arrow-right" style="font-size: 0.7rem; opacity: 0.3;"></i>
            </a>

            <a href="https://github.com/ZenithMc10" target="_blank" class="link-card">
                <i class="fab fa-github"></i>
                <span>GitHub Projects</span>
                <i class="fas fa-arrow-right" style="font-size: 0.8rem; opacity: 0.3;"></i>
            </a>

            <div class="link-card empty-slot">
                <i class="fas fa-hourglass-start"></i>
                <span>[ Haven't Done Anything ]</span>
            </div>

            <div class="link-card empty-slot">
                <i class="fas fa-hourglass-start"></i>
                <span>[ Haven't Done Anything ]</span>
            </div>

            <div class="link-card empty-slot">
                <i class="fas fa-hourglass-start"></i>
                <span>[ Haven't Done Anything ]</span>
            </div>
        </div>

        <div class="footer">
            ZEN HUB // 2026 // EST.
        </div>
    </div>

</body>
</html>
